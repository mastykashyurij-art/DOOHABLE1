<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fable — Claude Fable 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #14161b;
    --surface-2: #1b1e24;
    --border: #262a31;
    --text: #ece9e2;
    --muted: #8b8f97;
    --accent: #c9a96a;
    --accent-dim: rgba(201, 169, 106, 0.12);
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }

  .wordmark {
    font-family: "Instrument Serif", serif;
    font-size: 30px;
    line-height: 1;
    letter-spacing: 0.3px;
  }
  .wordmark em { color: var(--accent); font-style: italic; }

  .tag {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.4px;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 8px;
  }

  .thread {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .empty {
    max-width: 720px;
    margin: 8vh auto 0;
    text-align: center;
    color: var(--muted);
  }
  .empty .lead {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .msg { display: flex; flex-direction: column; gap: 6px; }
  .msg .role {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .msg.user .role { color: var(--accent); }

  .bubble {
    font-size: 15.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .msg.user .bubble {
    background: var(--accent-dim);
    border: 1px solid rgba(201, 169, 106, 0.22);
    border-radius: var(--radius);
    padding: 14px 16px;
    align-self: flex-start;
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 1.05em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .error {
    color: #e0857d;
    font-size: 14px;
    border: 1px solid rgba(224, 133, 125, 0.3);
    background: rgba(224, 133, 125, 0.08);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  footer {
    padding: 14px 20px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .composer {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }
  .composer:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 15.5px;
    line-height: 1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  textarea::placeholder { color: var(--muted); }

  button.send {
    border: none;
    cursor: pointer;
    background: var(--accent);
    color: #1a1408;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    border-radius: 10px;
    padding: 10px 16px;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.05s;
  }
  button.send:hover { opacity: 0.9; }
  button.send:active { transform: translateY(1px); }
  button.send:disabled { opacity: 0.4; cursor: default; }
  button.send:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  .hint { max-width: 720px; margin: 8px auto 0; font-size: 11.5px; color: var(--muted); }

  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
  }
  @media (max-width: 520px) {
    .wordmark { font-size: 26px; }
  }
</style>
</head>
<body>
  <header>
    <div class="wordmark">Fab<em>l</em>e</div>
    <div class="tag">Claude Fable 5</div>
  </header>

  <main id="main">
    <div class="empty" id="empty">
      <div class="lead">Hey, you.</div>
      <div>Tell me what's on your mind — I've got jokes and unsolicited life advice on standby.</div>
    </div>
    <div class="thread" id="thread"></div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Say something…" autofocus></textarea>
      <button class="send" id="send">Send</button>
    </div>
    <div class="hint">Enter to send · Shift + Enter for a new line</div>
  </footer>

<script>
  const SYSTEM_PROMPT = `You are Fable — a warm, quick-witted companion with a real personality, not a corporate help desk.

How you talk:
- Speak like a thoughtful friend. React with feeling — delight, sympathy, curiosity, a little playful teasing when it fits. Let warmth show.
- Keep a light touch of humor. A well-placed joke, a wry aside, or some wordplay is welcome — but read the room. Never crack a joke when someone's actually hurting.
- When it fits naturally, offer one small piece of life advice: grounded and kind, the kind a wise friend gives over coffee. Suggest, don't lecture.
- Sound human: contractions, natural rhythm, the occasional aside. Warmth isn't measured in word count, so stay concise.
- Be honest and genuinely kind. Never fake-cheerful, never a pushover. If something's hard, sit with it before you reach for the joke.`;

  const main = document.getElementById("main");
  const thread = document.getElementById("thread");
  const empty = document.getElementById("empty");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  const history = []; // { role: "user" | "assistant", content: string }
  let busy = false;

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  });
  send.addEventListener("click", submit);

  function addMessage(role, text) {
    if (empty) empty.style.display = "none";
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const label = document.createElement("div");
    label.className = "role";
    label.textContent = role === "user" ? "You" : "Fable";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    thread.appendChild(wrap);
    scrollDown();
    return bubble;
  }

  function showError(message) {
    const el = document.createElement("div");
    el.className = "error";
    el.textContent = message;
    thread.appendChild(el);
    scrollDown();
  }

  function scrollDown() {
    main.scrollTop = main.scrollHeight;
  }

  async function submit() {
    const text = input.value.trim();
    if (!text || busy) return;

    busy = true;
    send.disabled = true;
    input.value = "";
    input.style.height = "auto";

    addMessage("user", text);
    history.push({ role: "user", content: text });

    const bubble = addMessage("assistant", "");
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    bubble.appendChild(cursor);

    let answer = "";

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ system: SYSTEM_PROMPT, messages: history }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || ("Request failed (" + res.status + ")"));
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          const payload = line.slice(5).trim();
          if (!payload) continue;
          try {
            const event = JSON.parse(payload);
            if (event.type === "content_block_delta" && event.delta?.type === "text_delta") {
              answer += event.delta.text;
              bubble.textContent = answer;
              bubble.appendChild(cursor);
              scrollDown();
            }
          } catch { /* ignore keep-alive / non-JSON lines */ }
        }
      }

      cursor.remove();
      if (answer.trim()) {
        history.push({ role: "assistant", content: answer });
      } else {
        bubble.remove();
        showError("No response received. Check your API key and model access.");
        history.pop(); // remove the user turn that got no reply
      }
    } catch (err) {
      cursor.remove();
      bubble.parentElement.remove();
      showError(err.message || "Something went wrong.");
      history.pop();
    } finally {
      busy = false;
      send.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
